#PLEASE READ THE WHOLE CONFIG BEFORE ATTEMPTING TO DO ANYTHING
#CONNECTORS/PORTS ON THE CONTROLLERS ARE NOTED WITH COMMENTS FOR EACH LOCATION/INPUT/OUTPUT

#How do I upgrade to the latest software?
#The general way to upgrade is to ssh into the Raspberry Pi and run:
#cd ~/klipper
#git pull
#~/klipper/scripts/install-octopi.sh

#To recompile and reflash the micro-controller code:

### For SKR1.4 Turbo MCU firmware update:###
#	sudo service klipper stop
#	cd ~/klipper
#	git pull
#	make clean
#	make menuconfig					#LPC1769....Turbo
#	make
#	./scripts/flash-sdcard.sh /dev/serial/by-id/usb-Klipper_lpc1769_1E80001347084AAFAEE16C5DC32000F5-if00 btt-skr-turbo-v1.4			 #Address of your Board as in config below#
#		sudo service klipper start		#No need to run this line if carring on to below update#

#However, it's often the case that only the host software changes. In this case, one can update and restart just the host software with:
#	cd ~/klipper
#	git pull
#	sudo service klipper restart
#If after using this shortcut the software warns about needing to reflash the micro-controller or some other unusual error occurs, then follow the full upgrade steps outlined above.
#Note that the RESTART and FIRMWARE_RESTART g-code commands do not load new software - the above "sudo service klipper restart" and "make flash" commands are needed for a software change to take effect.


# use the following modifiers before the pin definition (ex: ^!ar99)
# ! 			invert the logic
# ^ 			activate 5v pullup (does not apply to all pins)
# mcu_name: 	use pins on additional MCU (ex: Tri:PF0)


#____________________________ Include Configs ______________________________#
[include mainsail.cfg]
[include Parbot_Stuff/Print_Start_Con.cfg]
[include Parbot_Stuff/Nozzle_Purge_and_Clean.cfg]
[include Parbot_Stuff/Case_Neos.cfg]
[include Parbot_Stuff/Par_Homing.cfg]
[include Parbot_Stuff/TRI_PURGE.cfg]
[include probe.cfg]
[include klipper-toolchanger/homing_override.cfg]
[include klipper-toolchanger/stealthburner_macros_tc.cfg]
[include klipper-toolchanger/tool_detection.cfg]
[include klipper-toolchanger/toolboard_0.cfg]
[include klipper-toolchanger/toolboard_1.cfg]
[include klipper-toolchanger/toolchanger_macros.cfg]
[include klipper-toolchanger/toolchanger.cfg]
[include klipper-toolchanger/tc_offset_calibration_macros.cfg] #


[mcu]
#You will need to set this definition manually following the instructions in the line below
#	obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
serial: /dev/serial/by-id/usb-Klipper_lpc1769_1E80001347084AAFAEE16C5DC32000F5-if00
#restart_method: command

# MCU RPi __Raspberry Pi 3B+___#
[mcu rpi]
serial: /tmp/klipper_host_mcu

# Raspberry Pi Temperature Sensor
[temperature_sensor 3_Rpi]
sensor_type: temperature_host
gcode_id: P

# Printer Setup #
[printer]
kinematics: corexy
max_velocity: 1000 #400  
max_accel: 5000 #24000 #15000
max_z_velocity: 10 #15
max_z_accel: 80 #100
square_corner_velocity: 5.0

[idle_timeout]
timeout: 3600

[exclude_object]

[input_shaper]

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[display_status]

[pause_resume]

[force_move]
enable_force_move: true

# Enable arcs support
[gcode_arcs]
resolution: 0.1

[save_variables]
filename: ~/printer_data/config/klipper-toolchanger/offset_save_file.cfg

[respond]


#####################################################################
#   X/Y Stepper Settings
#####################################################################

######
## connected to SKR XYE - X Stepper
###############
[stepper_x]

step_pin: P2.2
dir_pin: !P2.6
enable_pin: multi_pin:my_enable_pin
rotation_distance: 40
microsteps: 64 #32
full_steps_per_rotation: 200
# connected to EBB36 - X Endstop
#endstop_pin: toolboard_0: PB6
endstop_pin: P1.29
position_min: -50
position_endstop: 347.5
position_max: 351

homing_speed: 100
homing_retract_speed:20
homing_retract_dist: 5
second_homing_speed: 10
homing_positive_dir: true

##--------------------------------------------------------------------
##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_x]
uart_pin: P1.10
interpolate: true #was false 21/10/2025
run_current: 1.15 #1.25
#hold_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 0

# Pi & Stepper Fans
[multi_pin my_enable_pin]
pins: !P2.1, P2.3

######
# connected to SKR XYZ - Y Stepper
###############
[stepper_y]

step_pin: P0.19
dir_pin: !P0.20
enable_pin: !P2.8
rotation_distance: 40
full_steps_per_rotation: 200
microsteps: 64 #32
# connected to SKR XYZ - Y Endstop
endstop_pin: P1.28
position_min: -8
position_endstop: 289.25
position_max: 290

homing_speed: 100
homing_retract_speed:20
homing_retract_dist: 5
second_homing_speed: 10
homing_positive_dir: true
##--------------------------------------------------------------------
##  Make sure to update below for your relevant driver
[tmc2209 stepper_y]
uart_pin: P1.9
interpolate: true #was false 21/10/2025
run_current: 1.15 #1.25
#hold_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   Z Stepper Settings
#####################################################################

######
# Z0 Stepper - Left Front
# connected to SKR XYZ - E0 Stepper
###############
[stepper_z]

step_pin: P2.13
dir_pin: !P0.11
enable_pin: !P2.12
#T2 Leadscrew attached to a 1.8 deg Motor
rotation_distance: 2
full_steps_per_rotation: 200
microsteps: 16

# connected to Probe Endstop
endstop_pin: probe:z_virtual_endstop
#endstop_pin: can0:PB5
#position_endstop: 0
position_max: 330 #this is set here on purpose, your actual travel will vary based on spring compression holding the bed, adjust at your own risk
position_min: -1.00 #this is set here on purpose, your actual travel will vary based on spring compression holding the bed, adjust at your own risk
homing_speed: 8 
second_homing_speed: 5.0
homing_retract_dist: 5.0
homing_positive_dir: false

##--------------------------------------------------------------------
[tmc2208 stepper_z]
uart_pin: P1.4
interpolate: true #false
run_current: 1.3 #1.2
#hold_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

######
#Z1 Stepper - Center Rear
# connected to SKR XYZ - Z Stepper
###############
[stepper_z1]

step_pin: P0.22
dir_pin: !P2.11
enable_pin: !P0.21
#T2 Leadscrew attached to a 1.8 deg Motor
rotation_distance: 2
full_steps_per_rotation: 200
microsteps: 16

##--------------------------------------------------------------------
[tmc2208 stepper_z1]
uart_pin: P1.8
interpolate: true #false
run_current: 1.3 #1.2
#hold_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

######
#Z2 Stepper - Front Right
# connected to SKR XYZ - E1 Stepper
###############
[stepper_z2]

step_pin: P1.15
dir_pin: !P1.14
enable_pin: !P1.16
#T2 Leadscrew attached to a 1.8 deg Motor
rotation_distance: 2
full_steps_per_rotation: 200
microsteps: 16

##--------------------------------------------------------------------
[tmc2208 stepper_z2]
uart_pin: P1.1
interpolate: true #false
run_current: 1.3 #1.2
#hold_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0


#####################################################################
#   Bed Heater
#####################################################################

######
# connected to SKR XYE - BED
###############
[heater_bed]
heater_pin: P2.5
## Check what thermistor type you have. See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types.
sensor_type: NTC 100K MGB18-104F39050L32
# connected to SKR XYE - HB Temp
sensor_pin: P0.25
smooth_time: 1.0
##  Adjust Max Power so your heater doesn't warp your bed
max_power: 1.0
#Build Plate PID Settings
control: pid
pid_Kp: 40.280 
pid_Ki: 0.192 
pid_Kd: 2017.129
min_temp: 10
max_temp: 130

[temperature_sensor 1_Heated_Bed]
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: P0.23
min_temp: 10
max_temp: 120
#   See the "extruder" section for the definition of the above
#   parameters.
#gcode_id:
#   See the "heater_generic" section for the definition of this
#   parameter

#####################################################################
#   Bed Macros
#####################################################################
# [z_tilt]
# z_positions:
#     -77.5, 1
#     150, 324
#     377.5, 1
# #	You will need to set these yourself, based on offset from the nozzle to the shoulder bolt pivots under the bed, you can then uncomment the lines above
# #	To do this, put the gantry at 0,0 and measure the offset from the nozzle using a metric tape measure, place the coordinates into the lines above
# #   A list of X,Y coordinates (one per line; subsequent lines
# #   indented) describing the location of each bed "pivot point". The
# #   "pivot point" is the point where the bed attaches to the given Z
# #   stepper. It is described using nozzle coordinates (the XY position
# #   of the nozzle if it could move directly above the point). The
# #   first entry corresponds to stepper_z (Front Left), the second to stepper_z1(Front Right),
# #   the third to stepper_z2(Rear Middle), etc.
# points:
#     20, 20
#     150, 280
#     280, 20
# #   A list of X,Y coordinates (one per line; subsequent lines
# #   indented) that should be probed during a Z_TILT_ADJUST command.
# #   Specify coordinates of the nozzle and be sure the probe is above
# #   the bed at the given nozzle coordinates.

# speed: 300
# horizontal_move_z: 6.0
# retries: 6
# retry_tolerance: 0.02

# Mesh Bed Settings
[bed_mesh]
speed: 300
horizontal_move_z: 4
mesh_min: 10,20
mesh_max: 285,285
probe_count: 7,7
fade_start: 1.5
fade_end: 0
split_delta_z: .025
move_check_distance: 5.0
mesh_pps: 2,2
algorithm: bicubic
bicubic_tension: 0.1
#relative_reference_index: 12  # ^^^because were measuring the offset from the nozzle switch to the bed using the center of the bed, the equation to find the location = (probe point count)/2-1


#####################################################################
#   Heated Chamber
#####################################################################

###############
# conected to SKR XYZ
###############
[heater_generic chamber]
# #gcode_id: C
heater_pin: P2.7
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: P0.24
#smooth_time: 3.0

max_power: 1.00
control: watermark #pid
max_delta: 5.0
# #pwm_cycle_time: 0.300
min_temp: 5
max_temp: 90

[verify_heater chamber]
check_gain_time: 180
# #   This controls heater verification during initial heating. Smaller
# #   values result in stricter checking and larger values allow for
# #   more time before an error is reported. Specifically, during
# #   initial heating, as long as the heater increases in temperature
# #   within this time frame (specified in seconds) then the internal
# #   "error counter" is reset. The default is 20 seconds for extruders
# #   and 60 seconds for heater_bed.
heating_gain: 1
# #   The minimum temperature (in Celsius) that the heater must increase
# #   by during the check_gain_time check. It is rare to customize this
# #   value. The default is 2.

#####################################################################
#   Extruder PID ~~~ So save_config works ~~~
#####################################################################
#	Macro to PID both Hotends
[gcode_macro PID_Hotends]
gcode:
  SET_FAN_SPEED FAN=part_fan_t0 SPEED=1.0
  PID_CALIBRATE HEATER=extruder TARGET=210
  SET_FAN_SPEED FAN=part_fan_t0 SPEED=0.0
  Tool_Attach_T1
  SET_FAN_SPEED FAN=part_fan_t1 SPEED=1.0
  PID_CALIBRATE HEATER=extruder1 TARGET=210
  SET_FAN_SPEED FAN=part_fan_t0 SPEED=0.0
  Tool_Attach_T0
  SAVE_CONFIG
  

