#####################################################################
#   Lights and Neopixels
#####################################################################

#Case lights
[output_pin Lights]
pin: !rpi:gpio27

#Neopixels
[neopixel Case_Neo]
pin: P1.24
chain_count: 13

[gcode_button Light]
pin: ^!P1.22
press_gcode: LED_TOGGLE

[gcode_button E-Stop]
pin: ^!P1.23
press_gcode:{ action_emergency_stop() }

[delayed_gcode delayed_printer_off]
initial_duration: 0.
gcode:
   {% if printer.idle_timeout.state == "Idle" %}
   SHUTDOWN
   {% endif %}

# #	Macro to Shutdown Machine
# [gcode_macro ALL_SHUTDOWN]
# gcode:
#   SET_LED LED=Case_Neo RED=0.0 GREEN=0.0 BLUE=0.0
#   {action_call_remote_method("shutdown_machine")}

#	Macro to Switch off Case_Neo
[gcode_macro NEOs_OFF]
gcode:
  SET_LED LED=Case_Neo RED=0.0 GREEN=0.0 BLUE=0.0
  SET_LOGO_LEDS_OFF
  SET_NOZZLE_LEDS_OFF

#SET_LED LED=status_leds RED=0.0 GREEN=0.0 BLUE=0.0 TRANSMIT=1

# LEDs macro
[gcode_macro LEDs_ON]
gcode:
    SET_PIN PIN=Lights VALUE=1

[gcode_macro LEDs_OFF]
gcode:
    SET_PIN PIN=Lights VALUE=0

[gcode_macro LED_TOGGLE]
gcode:
    {% if printer ["output_pin Lights"].value == 1 %}
        LEDs_OFF
    {% else %}
        LEDs_ON
    {% endif %}


[gcode_macro Attach_Tool_T0]
gcode:
    T0

[gcode_macro Attach_Tool_T1]
gcode:
    T1

[gcode_macro Test_Dock_Switching]
gcode:
    DOCK_SEQUENCE

